name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install backend dependencies
        run: npm ci --omit=dev
        working-directory: ./backend

      - name: Build frontend
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/

      - name: Deploy to server
        if: success()
        run: |
          echo "Deployment step placeholder"
          echo "Configure your server SSH and PM2 commands here"
          # Example:
          # rsync -avz --delete frontend/dist/ user@server:/var/www/srams/frontend/
          # rsync -avz --delete backend/ user@server:/var/www/srams/backend/
          # ssh user@server "cd /var/www/srams/backend && pm2 restart srams-api"
